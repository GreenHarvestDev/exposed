name: Release

# Publishes to PyPI via Trusted Publishing (OIDC) — no API tokens stored.
# Trigger: push a version tag, e.g.  git tag v0.1.0 && git push origin v0.1.0
# One-time setup on PyPI: add this repo as a Trusted Publisher for the `exposed`
# project (workflow: release.yml, environment: pypi).

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build twine
      - name: Build sdist + wheel
        run: python -m build
      - name: Check metadata
        run: twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
